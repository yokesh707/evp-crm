// ── FIREBASE INIT ─────────────────────────────────────────────────────────────
function initFirebase(){
  if(!CONFIG_SET){render();return;}
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    DB=firebase.database();
    // Real-time listeners - instant sync between all users
    DB.ref('leads').on('value',function(snap){
      DATA.leads=[];
      if(snap.val()){Object.keys(snap.val()).forEach(function(k){DATA.leads.push(Object.assign({},snap.val()[k],{id:k}));});}
      if(!LOADING)render();
    },function(err){console.error('Leads sync error:',err);});
    DB.ref('bookings').on('value',function(snap){
      DATA.bookings=[];
      if(snap.val()){Object.keys(snap.val()).forEach(function(k){DATA.bookings.push(Object.assign({},snap.val()[k],{id:k}));});}
      LOADING=false;render();
    },function(err){console.error('Bookings sync error:',err);LOADING=false;render();});
    DB.ref('decors').on('value',function(snap){
      DATA.decors=[];
      if(snap.val()){Object.keys(snap.val()).forEach(function(k){DATA.decors.push(Object.assign({},snap.val()[k],{id:k}));});}
      if(!LOADING)render();
    },function(err){console.error('Decors sync error:',err);});
    DB.ref('ledger').on('value',function(snap){
      DATA.ledger=[];
      if(snap.val()){Object.keys(snap.val()).forEach(function(k){DATA.ledger.push(Object.assign({},snap.val()[k],{id:k}));});}
      DATA.ledger.sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
      if(UI.page==='ledger'&&!LOADING)render();
    },function(err){console.error('Ledger sync error:',err);});
    loadChat();
  }catch(e){console.error('Firebase init failed:',e);LOADING=false;render();}
}

function cloudSaveLead(lead){
  if(!DB)return;
  // Track edit history
  if(AUTH){var log=(lead.editLog||[]).slice();log.push({by:AUTH.display,at:new Date().toISOString(),note:'Updated lead'});if(log.length>20)log=log.slice(-20);lead=Object.assign({},lead,{editLog:log});}
  DB.ref('leads/'+lead.id).set(lead).catch(function(e){alert('Save failed. Check internet connection.');console.error(e);});
}
function cloudSaveBooking(bkg){
  if(!DB)return;
  // Track edit history
  if(AUTH){var log=(bkg.editLog||[]).slice();log.push({by:AUTH.display,at:new Date().toISOString(),note:'Updated booking'});if(log.length>30)log=log.slice(-30);bkg=Object.assign({},bkg,{editLog:log});}
  DB.ref('bookings/'+bkg.id).set(bkg).catch(function(e){alert('Save failed. Check internet connection.');console.error(e);});
}

function parseCSVLine(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  result.push(cur.trim());
  return result;
}
function importLedgerCSV(){
  if(!isAdminOrManager()){alert('Access restricted.');return;}
  var inp=document.getElementById('led-import');if(!inp)return;
  var file=inp.files[0];if(!file){alert('No file selected.');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var lines=e.target.result.split(/\r?\n/).filter(function(l){return l.trim();});
    if(lines.length<2){alert('Empty file or no data rows.');return;}
    var cols=parseCSVLine(lines[0]).map(function(c){return c.toLowerCase();});
    var di=cols.indexOf('date'),ti=cols.indexOf('type'),ci=cols.indexOf('category'),ai=cols.indexOf('amount'),dsi=cols.indexOf('description'),bi=cols.indexOf('client/booking'),si=cols.indexOf('scope');
    var added=0;
    for(var r=1;r<lines.length;r++){
      var vals=parseCSVLine(lines[r]);
      var amt=Number(vals[ai]||0);
      if(!amt)continue;
      var scope=si>-1?(vals[si]||'venue'):'venue';
      var entType=(vals[ti]||'').toLowerCase().indexOf('inc')>-1?'income':'expense';
      var obj={id:uid(),scope:scope,type:entType,
        category:ci>-1?vals[ci]:'Imported',amount:amt,date:di>-1?vals[di]:today(),
        description:dsi>-1?vals[dsi]:'',bookingName:bi>-1?vals[bi]:'',
        addedBy:AUTH?AUTH.display:'Import',createdAt:new Date().toISOString()};
      cloudSaveLedger(obj);added++;
    }
    alert(added+' entries imported! ✅\nRefreshing data...');
    closeOv();
  };
  reader.readAsText(file);
}

function paidof(b){return(b.payments||[]).reduce(function(s,p){return p.stage!=='Deposit Refund'?s+(Number(p.amount)||0):s;},0);}
function calcp(b){
  var r=Number(b.rentAmount)||0,m=Number(b.maintAmount)||0,d=Number(b.depositAmount)||0;
  var sub=r+m+d,di=Number(b.discountAmount)||0,net=Math.max(0,sub-di);
  var gR=b.gstEnabled?(Number(b.gstRate)||18):0,gst=gR?Math.round(net*gR/100):0;
  var ebKVA=0;if(b.ebStart&&b.ebEnd){ebKVA=Math.max(0,Number(b.ebEnd)-Number(b.ebStart));}
  var ebUnits=Math.round(ebKVA*40);
  var ebAmt=ebUnits*24;
  // Maintenance expenses — internal only, NOT added to client bill
  var ec=b.extraCharges||{};
  var maintSpent=(ec.hkHalf?800:0)+(ec.hkFull?1300:0)+(ec.brahminWed?2500:0)+((Number(ec.valetCount)||0)*800)+((Number(ec.secCount)||0)*800)+(Number(ec.water)||0)+(Number(ec.garbage)||0)+(Number(ec.drainage)||0)+(Number(ec.diesel)||0)+(ec.electrician?2500:0)+(ec.elevation?10000:0)+(Number(b.extrasAmt)||0);
  var maintProfit=m-maintSpent;
  // Additional Charges — truly extra, billed to client or deducted from deposit
  var ac=b.addCharges||{};
  var addChTotal=(Number(ac.chairCovers)||0)+(Number(ac.vazhanaram)||0)+(Number(ac.vessels)||0)+(Number(ac.addDiesel)||0)+(Number(ac.other1Amt)||0)+(Number(ac.other2Amt)||0);
  var addChOnClient=(ac.payMode!=='deposit');
  // Grand total: Rent + Maint + Deposit (package) − discount + GST + Additional Charges if client pays
  // EB and Generator diesel are deducted from deposit — NOT added to client total
  var grand=net+gst+(addChOnClient?addChTotal:0);
  var pa=paidof(b),bal=Math.max(0,grand-pa);
  // Deposit deductions (EB + diesel + damages etc.)
  var dd=b.depositDeductions||{};
  var ddTotal=ebAmt+(Number(dd.genDiesel)||0)+(Number(dd.extraRooms)||0)+(Number(dd.extraBeds)||0)+(Number(dd.damages)||0)+(Number(dd.addHeadCount)||0)+(Number(dd.addHousekeeping)||0)+(Number(dd.addHours)||0)+(Number(dd.other)||0)+(Number(dd.decorDeduction)||0)+(Number(dd.otherServiceDeduction)||0)+(!addChOnClient?addChTotal:0);
  var depRefund=Math.max(0,d-ddTotal);
  return{rent:r,mnt:m,dep:d,sub:sub,disc:di,net:net,gR:gR,gst:gst,ebKVA:ebKVA,ebUnits:ebUnits,ebAmt:ebAmt,maintSpent:maintSpent,maintProfit:maintProfit,extTotal:0,addChTotal:addChTotal,addChOnClient:addChOnClient,grand:grand,paid:pa,bal:bal,ddTotal:ddTotal,depRefund:depRefund};
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  var root=document.getElementById('app');
  if(!CONFIG_SET){root.innerHTML=renderSetup();return;}
  if(LOADING){root.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px"><div class="spinner"></div><div style="color:var(--gold);font-size:14px">Connecting to cloud...</div></div>';return;}
  if(!AUTH){root.innerHTML=renderLogin();attachEvents();return;}
  var h=renderTopbar()+'<div class="pg">';
  if(UI.page==='dashboard')h+=renderDash();
  else if(UI.page==='leads')h+=renderLeads();
  else if(UI.page==='bookings')h+=renderBkgs();
  else if(UI.page==='booking')h+=renderBkg();
  else if(UI.page==='calendar')h+=renderCal();
  else if(UI.page==='payments')h+=renderPays();
  else if(UI.page==='ledger')h+=renderLedger();
  else if(UI.page==='chat')h+=renderChat();

  root.innerHTML=h;
  attachEvents();
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function renderLogin(){return '<div class="lwrap"><div class="lcard"><div style="text-align:center;margin-bottom:20px">'+logo(80)+'</div><div style="text-align:center;font-size:18px;font-weight:800;margin-bottom:4px">Welcome Back</div><div style="text-align:center;font-size:11px;color:var(--mu);margin-bottom:6px">EVP Rajeshwari CRM</div><div style="text-align:center;margin-bottom:20px"><span class="sync-dot"></span><span style="font-size:11px;color:var(--gr)">Live sync active — Cloud connected</span></div><div id="lerr" style="display:none;background:var(--rF);border:1px solid rgba(200,64,48,.35);border-radius:7px;padding:9px 13px;color:var(--rd);font-size:12px;text-align:center;margin-bottom:13px">Incorrect Employee ID or password</div><div class="fg"><label class="fl">Employee ID</label><input class="inp" id="lu" placeholder="e.g. 0001" autocomplete="username" inputmode="numeric"></div><div class="fg"><label class="fl">Password</label><input class="inp" id="lp" type="password" placeholder="Enter password"></div><button class="btn bp bl lg" onclick="doLogin()" style="margin-top:8px">Login</button></div></div>';}
function doLogin(){
  var u=(document.getElementById('lu')||{}).value||'';
  var p=(document.getElementById('lp')||{}).value||'';
  var k=u.trim();var usr=USERS[k];
  if(usr&&usr.pass===p){
    AUTH={key:k,role:usr.role,display:usr.display};
    saveAuth();
    UI.page='dashboard';
    // Save last login info to Firebase
    if(DB){
      var _now=new Date().toISOString();
      var _ua=navigator.userAgent||'';
      var _dev=_ua.indexOf('Android')>-1?'Android':_ua.indexOf('iPhone')>-1?'iPhone':'Browser';
      // Read previous login before overwriting
      DB.ref('lastLogin/'+k).once('value',function(snap){
        if(snap.val()) LAST_LOGIN=snap.val();
        DB.ref('lastLogin/'+k).set({at:_now,device:_dev,display:usr.display});
      });
    }
    requestNotifPermission();
    render();
    loadNotifs();
  }else{
    var el=document.getElementById('lerr');if(el)el.style.display='block';
  }
}

function updBFtot(){var r=Number((document.getElementById('bf-rv')||{}).value)||0,m=Number((document.getElementById('bf-mv')||{}).value)||0,d=Number((document.getElementById('bf-dv')||{}).value)||0,di=Number((document.getElementById('bf-di')||{}).value)||0,gEn=(document.getElementById('bf-gst')||{}).checked||false,gR=gEn?(Number((document.getElementById('bf-gr')||{}).value)||18):0,net=Math.max(0,r+m+d-di),gst=gR?Math.round(net*gR/100):0;var ebs=Number((document.getElementById('bf-ebs')||{}).value)||0,ebe=Number((document.getElementById('bf-ebe')||{}).value)||0,ebUnits=Math.max(0,ebe-ebs),ebAmt=ebUnits*24;
// Maintenance expenses — internal tracking only, NOT added to client total
var maintSpent=(((document.getElementById('bf-ec-hkHalf')||{}).checked)?800:0)+(((document.getElementById('bf-ec-hkFull')||{}).checked)?1300:0)+(((document.getElementById('bf-ec-brahminWed')||{}).checked)?2500:0)+((Number((document.getElementById('bf-ec-valetCount')||{}).value)||0)*800)+((Number((document.getElementById('bf-ec-secCount')||{}).value)||0)*800)+(((document.getElementById('bf-ec-electrician')||{}).checked)?2500:0)+(((document.getElementById('bf-ec-elevation')||{}).checked)?10000:0)+(Number((document.getElementById('bf-ec-water')||{}).value)||0)+(Number((document.getElementById('bf-ec-garbage')||{}).value)||0)+(Number((document.getElementById('bf-ec-drainage')||{}).value)||0)+(Number((document.getElementById('bf-ec-diesel')||{}).value)||0);
var maintProfit=m-maintSpent;
// Additional Charges — truly extra, billed to client
var addChTotal=(Number((document.getElementById('bf-ac-chairCovers')||{}).value)||0)+(Number((document.getElementById('bf-ac-vazhanaram')||{}).value)||0)+(Number((document.getElementById('bf-ac-vessels')||{}).value)||0)+(Number((document.getElementById('bf-ac-diesel')||{}).value)||0)+(Number((document.getElementById('bf-ac-oth1a')||{}).value)||0)+(Number((document.getElementById('bf-ac-oth2a')||{}).value)||0);
var acDepMode=(document.getElementById('bf-ac-deposit')||{}).checked;
// Grand: EB is NOT included — EB deducted from deposit
var grand=net+gst+(acDepMode?0:addChTotal);
var se=document.getElementById('bf-sub');if(se)se.textContent=fm(r+m+d);
var ec=document.getElementById('bf-ebcost');if(ec){ec.textContent=fm(ebAmt)+' ← from deposit';ec.style.color=ebAmt>0?'var(--or)':'var(--mu)';}
var xc=document.getElementById('bf-extcost');if(xc)xc.textContent=fm(maintSpent);
var mp=document.getElementById('bf-mnt-profit');if(mp){mp.textContent=fm(maintProfit>=0?maintProfit:0);mp.style.color=maintProfit>=0?'var(--gr)':'var(--rd)';}
var mc=document.getElementById('bf-mnt-col');if(mc)mc.textContent=fm(m);
var ac2=document.getElementById('bf-addchtot');if(ac2)ac2.textContent=fm(addChTotal);
var te=document.getElementById('bf-tot');if(te)te.textContent=fm(grand);
var ae=document.getElementById('bf-adv');if(ae)ae.textContent=fm(Math.round(grand*0.5));
var be=document.getElementById('bf-bal');if(be)be.textContent=fm(grand-Math.round(grand*0.5));
updDepRef();}

function updDepRef(){
  var dep=Number((document.getElementById('bf-dv')||{}).value)||0;
  // EB auto-included in deposit deductions
  var ebs2=Number((document.getElementById('bf-ebs')||{}).value)||0,ebe2=Number((document.getElementById('bf-ebe')||{}).value)||0;
  var ebAmt2=Math.max(0,ebe2-ebs2)*24;
  var manualDed=['bf-dd-diesel','bf-dd-xrooms','bf-dd-xbeds','bf-dd-dam','bf-dd-ahc','bf-dd-ahk','bf-dd-ahr','bf-dd-oth','bf-dd-decor','bf-dd-svc'].reduce(function(s,id){return s+(Number((document.getElementById(id)||{}).value)||0);},0);
  var ded=ebAmt2+manualDed;
  var ref=Math.max(0,dep-ded);
  var rs=document.getElementById('bf-dep-ref');if(rs)rs.textContent='₹'+ref.toLocaleString('en-IN');
  var ds=document.getElementById('bf-dep-show');if(ds)ds.textContent='₹'+dep.toLocaleString('en-IN');
  // Show EB deduction in deposit section
  var ebdd=document.getElementById('bf-dep-eb');if(ebdd)ebdd.textContent=ebAmt2>0?'₹'+ebAmt2.toLocaleString('en-IN'):'—';
}

function buildCRMContext(){
  var now=new Date(),todayStr=today();
  var ctx='You are EVP AI, the intelligent assistant for EVP Rajeshwari Marriage Palace CRM.\n';
  ctx+='You know everything about bookings, leads, payments, accounts and muhurtham dates.\n';
  ctx+='Answer in the same language the user asks (Tamil or English). Be concise and helpful.\n';
  ctx+='Today: '+new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'\n\n';

  // Bookings
  ctx+='=== BOOKINGS ('+DATA.bookings.length+') ===\n';
  DATA.bookings.slice().sort(function(a,b){return(a.startDate||'').localeCompare(b.startDate||'');}).forEach(function(b){
    var p=calcp(b);
    var daysAway=b.startDate?Math.round((new Date(b.startDate+'T00:00:00')-now)/(86400000)):null;
    ctx+='• '+b.name+' | '+xe(b.fnType||'')+' | '+fd(b.startDate)+(daysAway!==null?' ('+( daysAway>0?'in '+daysAway+' days': daysAway===0?'TODAY':''+Math.abs(daysAway)+' days ago')+')':'')+'\n';
    ctx+='  Total: '+fm(p.grand)+' | Paid: '+fm(p.paid)+' | Balance: '+(p.bal>0?fm(p.bal)+' PENDING':'CLEARED')+'\n';
    if(b.decor&&b.decor.budget>0){var dp=decorPaid(b);ctx+='  Decor: Budget '+fm(Number(b.decor.budget))+' | Received '+fm(dp)+' | Due '+fm(Math.max(0,Number(b.decor.budget)-dp))+'\n';}
    if(b.deposit&&Number(b.depositAmount)>0){ctx+='  Deposit: '+fm(Number(b.depositAmount))+' (to refund after event)\n';}
  });

  // Upcoming muhurtham dates (next 6 months)
  ctx+='\n=== UPCOMING MUHURTHAM DATES ===\n';
  var upcomingMuh=Object.keys(MUH_INFO).filter(function(d){return d>=todayStr;}).sort().slice(0,15);
  upcomingMuh.forEach(function(d){
    var mi=MUH_INFO[d];var isBooked=!!MUH[d]&&DATA.bookings.some(function(b){return b.startDate===d;});
    ctx+='• '+fd(d)+': '+mi.star+', '+mi.t+', Nalla Neram '+mi.m+(isBooked?' [BOOKED]':' [AVAILABLE]')+'\n';
  });

  // Leads
  ctx+='\n=== LEADS ('+DATA.leads.length+') ===\n';
  DATA.leads.filter(function(l){return l.status!=='lost'&&l.status!=='confirmed';}).forEach(function(l){
    ctx+='• '+l.name+' | '+xe(l.status)+' | '+(l.startDate?fd(l.startDate):'No date')+' | '+(l.phone||'')+'\n';
  });

  // Financial summary
  var totalRev=DATA.bookings.reduce(function(s,b){return s+calcp(b).paid;},0);
  var totalPending=DATA.bookings.reduce(function(s,b){return s+calcp(b).bal;},0);
  var totalDeposit=DATA.bookings.reduce(function(s,b){return s+Number(b.depositAmount||0);},0);
  var venExp=DATA.ledger.filter(function(e){return e.scope!=='event'&&e.type!=='income';}).reduce(function(s,e){return s+Number(e.amount||0);},0);
  var venInc=DATA.ledger.filter(function(e){return e.scope!=='event'&&e.type==='income';}).reduce(function(s,e){return s+Number(e.amount||0);},0);
  var evtExp=DATA.ledger.filter(function(e){return e.scope==='event';}).reduce(function(s,e){return s+Number(e.amount||0);},0);
  ctx+='\n=== FINANCIAL SUMMARY ===\n';
  ctx+='Total Collected from Clients: '+fm(totalRev)+'\n';
  ctx+='Total Pending from Clients: '+fm(totalPending)+'\n';
  ctx+='Deposits Held: '+fm(totalDeposit)+' (to be refunded)\n';
  ctx+='Venue Expenses (historical): '+fm(venExp)+'\n';
  ctx+='Event Expenses: '+fm(evtExp)+'\n';
  ctx+='Net P&L: '+fm(totalRev-venExp-evtExp)+'\n';
  return ctx;
}

async function sendToAI(userMsg){
  var key=getAIKey();
  if(!key){
    AI_MSGS.push({role:'assistant',content:'⚙️ Please set your Anthropic API key first. Tap the ⚙️ Settings button above.'});
    renderAIChat();return;
  }
  AI_MSGS.push({role:'user',content:userMsg});
  AI_THINKING=true;renderAIChat();
  try{
    var res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:800,
        messages:[{role:'system',content:buildCRMContext()}].concat(AI_MSGS.map(function(m){return{role:m.role,content:m.content};}))
      })
    });
    var data=await res.json();
    if(data.choices&&data.choices[0]){
      var reply=data.choices[0].message.content||'';
      AI_MSGS.push({role:'assistant',content:reply});
      if(AI_VOICE_OUT)speakAI(reply);
    }else if(data.error){
      AI_MSGS.push({role:'assistant',content:'❌ Error: '+(data.error.message||'Check your Groq API key')});
    }
  }catch(e){
    AI_MSGS.push({role:'assistant',content:'❌ Connection error. Check internet and try again.'});
  }
  AI_THINKING=false;renderAIChat();
}

function speakAI(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text.replace(/[₹*_#]/g,' '));
  u.lang='en-IN';u.rate=0.95;u.pitch=1;
  window.speechSynthesis.speak(u);
}

function startVoiceInput(){
  var SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRec){alert('Voice not supported on this browser. Use Chrome.');return;}
  var rec=new SpeechRec();
  rec.lang='en-IN';rec.interimResults=false;rec.maxAlternatives=1;
  var micBtn=document.getElementById('ai-mic');
  if(micBtn){micBtn.style.background='var(--rd)';micBtn.textContent='🔴';}
  rec.start();
  rec.onresult=function(e){
    var transcript=e.results[0][0].transcript;
    var inp=document.getElementById('ai-inp');if(inp)inp.value=transcript;
    if(micBtn){micBtn.style.background='';micBtn.textContent='🎤';}

  rec.onerror=function(){if(micBtn){micBtn.style.background='';micBtn.textContent='🎤';}};
  rec.onend=function(){if(micBtn){micBtn.style.background='';micBtn.textContent='🎤';}};
}

function pushNotif(toUser,msg,type){
  if(!DB)return;
  DB.ref('notifs/'+toUser).push({msg:msg,type:type||'info',time:new Date().toISOString(),read:false});
  // If notification is for the current user, show native notif immediately
  if(AUTH&&AUTH.key===toUser) showNativeNotif('EVP CRM 🔔',msg);
}
function loadNotifs(){
  if(!DB||!AUTH)return;
  var _prevUnread=0;
  DB.ref('notifs/'+AUTH.key).limitToLast(20).on('value',function(snap){
    NOTIFS=[];UNREAD=0;
    if(snap.val()){Object.keys(snap.val()).forEach(function(k){var n=Object.assign({},snap.val()[k],{id:k});NOTIFS.unshift(n);if(!n.read)UNREAD++;});}
    var b=document.getElementById('nb');
    if(b){b.textContent=UNREAD||'';b.style.display=UNREAD>0?'block':'none';}
    // Show native notif if new unread since last check
    if(UNREAD>_prevUnread&&_prevUnread>0&&NOTIFS[0]&&!NOTIFS[0].read){
      showNativeNotif('EVP CRM 🔔',NOTIFS[0].msg||'New notification');
    }
    _prevUnread=UNREAD;
  });
}
function markRead(){
  if(!DB||!AUTH)return;
  NOTIFS.forEach(function(n){if(!n.read)DB.ref('notifs/'+AUTH.key+'/'+n.id+'/read').set(true);});
  UNREAD=0;

    'bmd='+encodeURIComponent(src.brideMother||''),

    'cin='+encodeURIComponent(src.checkIn||''),
    'cout='+encodeURIComponent(src.checkOut||''),
    'r='+encodeURIComponent(isB?p2.rent:(sugPkg?sugPkg.rent:0)),
    'm='+encodeURIComponent(isB?p2.mnt:(sugPkg?sugPkg.maint:0)),

  try{
    if(!EDIT_ID){alert('No booking selected. Please close and try again.');return;}
    var b=fbkg(EDIT_ID);
    if(!b){alert('Booking not found. Please refresh.');return;}
    var _exDecor=b.decor||{};var _exPays=_exDecor.payments||{};
    // Build payment objects preserving any existing approval state
    function _dpay(newAmt,newDate,existing){
      var amt=Number(newAmt)||0;
      return {amount:amt,date:newDate||'',approvedBy:(amt>0&&existing&&existing.approvedBy)||null,approvedAt:(amt>0&&existing&&existing.approvedAt)||null};
    }
    var decObj={
      budget:Number((document.getElementById('bd-budget')||{}).value)||0,
      agent:(document.getElementById('bd-agent')||{}).value||'',
      status:(document.getElementById('bd-status')||{}).value||'Pending',

      payments:{
        finalised:_dpay((document.getElementById('bd-pf')||{}).value,(document.getElementById('bd-pfd')||{}).value,_exPays.finalised),
        production:_dpay((document.getElementById('bd-pp')||{}).value,(document.getElementById('bd-ppd')||{}).value,_exPays.production),
        pay1:_dpay((document.getElementById('bd-p1')||{}).value,(document.getElementById('bd-p1d')||{}).value,_exPays.pay1),
        pay2:_dpay((document.getElementById('bd-p2')||{}).value,(document.getElementById('bd-p2d')||{}).value,_exPays.pay2)
      }
    };
    // Check if any new payment was added (amount changed vs before)
    var _newPayAdded=false;
    ['finalised','production','pay1','pay2'].forEach(function(k){
      var oldAmt=Number((_exPays[k]||{}).amount)||0;
      var newAmt=Number((decObj.payments[k]||{}).amount)||0;
      if(newAmt>oldAmt) _newPayAdded=true;
    });
    var updated=Object.assign({},b,{decor:decObj});
    for(var i=0;i<DATA.bookings.length;i++){if(DATA.bookings[i].id===b.id){DATA.bookings[i]=updated;break;}}
    cloudSaveBooking(updated);
    // Notify Yokesh for approval if new decor payment added by non-admin
    if(_newPayAdded){
      if(!isAdmin()){
        pushNotif('0001','ௐ Decor payment added for '+b.name+' — awaiting approval','decor');
        alert('Decor saved! Yokesh will approve the payment.');
      }else{
        alert('Decor saved successfully!');
      }
    }else{
      alert('Decor saved successfully!');
    }
    var savedId=EDIT_ID;
    OV=null;EDIT_ID=null;FORM={};
    navBkg(savedId);
  }catch(e){
    alert('Save error: '+e.message);
  }
}

function loadAcctFile(input){
  var file=input.files[0];if(!file)return;
  var preview=document.getElementById('acct-preview');
  if(preview)preview.innerHTML='<div style="text-align:center;padding:16px;color:var(--mu)"><div class="spinner" style="margin:0 auto 8px"></div>Reading file...</div>';
  var ext=file.name.split('.').pop().toLowerCase();
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var rows=[];
      if(ext==='csv'){
        // Parse CSV
        var txt=e.target.result;
        var lines=txt.split(/\r?\n/).filter(function(l){return l.trim();});
        rows=lines.map(function(l){
          var cols=[],cur='',inQ=false;
          for(var i=0;i<l.length;i++){var c=l[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=c;}
          cols.push(cur.trim());return cols;
        });
      }else{
        // Parse Excel using SheetJS
        if(typeof XLSX==='undefined'){if(preview)preview.innerHTML='<div style="color:var(--rd);padding:12px">SheetJS library not loaded. Check internet connection.</div>';return;}
        var wb=XLSX.read(e.target.result,{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      }
      if(!rows.length){if(preview)preview.innerHTML='<div style="color:var(--or);padding:12px">No data found in file.</div>';return;}
      // Render table
      var th='<table style="width:100%;border-collapse:collapse;font-size:11px;min-width:400px">';
      rows.slice(0,200).forEach(function(row,ri){
        var isHead=ri===0;
        th+='<tr style="background:'+(ri%2===0?'var(--c2)':'transparent')+';border-bottom:1px solid var(--b2)">';
        row.forEach(function(cell){
          th+=(isHead?'<th style="padding:6px 8px;text-align:left;font-size:9px;color:var(--gold);font-weight:700;letter-spacing:.07em;text-transform:uppercase;border-bottom:2px solid var(--bdr);white-space:nowrap">':'<td style="padding:5px 8px;color:var(--cr);white-space:nowrap">')+xe(String(cell||''))+(isHead?'</th>':'</td>');
        });
        th+='</tr>';
      });
      th+='</table>';
      if(preview)preview.innerHTML='<div style="margin-bottom:8px;font-size:11px;color:var(--gr)">&#10003; Loaded: <b>'+file.name+'</b> &mdash; '+rows.length+' rows'+(rows.length>200?' (showing first 200)':'')+'</div>'+th;
    }catch(err){
      if(preview)preview.innerHTML='<div style="color:var(--rd);padding:12px">Error reading file: '+err.message+'</div>';
    }
  };
  if(ext==='csv'){reader.readAsText(file);}
  else{reader.readAsArrayBuffer(file);}
}

    if(root) root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background:#0F0804;padding:24px;text-align:center"><div style="color:#C8922A;font-size:18px;font-weight:800">EVP Rajeshwari CRM</div><div style="color:#C84030;font-size:14px;margin-top:8px">Connection Error</div><div style="color:#887060;font-size:12px;margin-top:8px">Please open via website URL:<br><br><span style="color:#C8922A;font-size:14px;font-weight:700">evpmarriagepalace.com</span><br><br>Do NOT open downloaded files directly</div><button onclick="location.reload()" style="margin-top:16px;background:#C8922A;color:#0F0804;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">Retry</button></div>';
    return;
