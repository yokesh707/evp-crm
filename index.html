// ── FIREBASE INIT ─────────────────────────────────────────────────────────────
function initFirebase(){
  if(!CONFIG_SET){render();return;}
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    DB=firebase.database();
    // Real-time listeners - instant sync between all users
    DB.ref('leads').on('value',function(snap){
      DATA.leads=[];
      if(snap.val()){Object.keys(snap.val()).forEach(function(k){DATA.leads.push(Object.assign({},snap.val()[k],{id:k}));});}
      if(!LOADING)render();
    },function(err){console.error('Leads sync error:',err);});
    DB.ref('bookings').on('value',function(snap){
      DATA.bookings=[];
      if(snap.val()){Object.keys(snap.val()).forEach(function(k){DATA.bookings.push(Object.assign({},snap.val()[k],{id:k}));});}
      LOADING=false;render();
    },function(err){console.error('Bookings sync error:',err);LOADING=false;render();});
    DB.ref('decors').on('value',function(snap){
      DATA.decors=[];
      if(snap.val()){Object.keys(snap.val()).forEach(function(k){DATA.decors.push(Object.assign({},snap.val()[k],{id:k}));});}
      if(!LOADING)render();
    },function(err){console.error('Decors sync error:',err);});
  }catch(e){console.error('Firebase init failed:',e);LOADING=false;render();}
}

function paidof(b){return(b.payments||[]).reduce(function(s,p){return p.stage!=='Deposit Refund'?s+(Number(p.amount)||0):s;},0);}
function calcp(b){
  var r=Number(b.rentAmount)||0,m=Number(b.maintAmount)||0,d=Number(b.depositAmount)||0;
  var sub=r+m+d,di=Number(b.discountAmount)||0,net=Math.max(0,sub-di);
  var gR=b.gstEnabled?(Number(b.gstRate)||18):0,gst=gR?Math.round(net*gR/100):0;
  var ebUnits=0;if(b.ebStart&&b.ebEnd){ebUnits=Math.max(0,Number(b.ebEnd)-Number(b.ebStart));}
  var ebAmt=ebUnits*24;
  var ec=b.extraCharges||{};
  var extTotal=(ec.hkHalf?800:0)+(ec.hkFull?1300:0)+(ec.brahminWed?2500:0)+((Number(ec.valetCount)||0)*800)+((Number(ec.secCount)||0)*800)+(Number(ec.water)||0)+(Number(ec.garbage)||0)+(Number(ec.drainage)||0)+(Number(ec.diesel)||0)+(ec.electrician?2500:0)+(ec.elevation?10000:0)+(Number(b.extrasAmt)||0);
  var grand=net+gst+ebAmt+extTotal,pa=paidof(b),bal=Math.max(0,grand-pa);
  return{rent:r,mnt:m,dep:d,sub:sub,disc:di,net:net,gR:gR,gst:gst,ebUnits:ebUnits,ebAmt:ebAmt,extTotal:extTotal,grand:grand,paid:pa,bal:bal};
}

function buildPDFQuote(src, type){
  // src = lead or booking object, type = 'lead' | 'booking'
  var isBooking = type === 'booking';
  var p = isBooking ? calcp(src) : null;
  var pkg = isBooking ? gpkg(src.pkgId) : null;
  var sugPkgId = !isBooking ? (PKG_MAP[src.fnType]||['half'])[0] : null;
  var sugPkg = sugPkgId ? gpkg(sugPkgId) : null;
  var adv = isBooking ? Math.round(p.grand*0.5) : (sugPkg ? Math.round((sugPkg.rent+sugPkg.maint+sugPkg.dep)*0.5) : 0);
  var grandEst = isBooking ? p.grand : (sugPkg ? (sugPkg.rent+sugPkg.maint+sugPkg.dep) : 0);

  var quoteNo = 'EVP-' + new Date().getFullYear() + '-' + String(Math.floor(Math.random()*9000)+1000);
  var quoteDate = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'});

  var svcList = [];

  // Extra charges for booking
  var ecLines = [];
  if(isBooking){
    var ec=src.extraCharges||{};
    if(ec.hkHalf)ecLines.push(['Housekeeping \u2014 Half Day','800']);
    if(ec.hkFull)ecLines.push(['Housekeeping \u2014 Full Day','1,300']);
    if(ec.brahminWed)ecLines.push(['Brahmin Wedding','2,500']);
    if(Number(ec.valetCount)>0)ecLines.push(['Valet Drivers (\u00d7'+ec.valetCount+')',''+fm(Number(ec.valetCount)*800)]);

    if(ec.electrician)ecLines.push(['Electrician','2,500']);
    if(ec.elevation)ecLines.push(['Elevation Lights','10,000']);
    if(Number(ec.water))ecLines.push(['Water',''+fm(Number(ec.water))]);
    if(Number(ec.garbage))ecLines.push(['Garbage Disposal',''+fm(Number(ec.garbage))]);
    if(Number(ec.drainage))ecLines.push(['Drainage',''+fm(Number(ec.drainage))]);
    if(Number(ec.diesel))ecLines.push(['Diesel',''+fm(Number(ec.diesel))]);
    if(src.extrasAmt)ecLines.push([src.extrasDesc||'Additional Charges',''+fm(Number(src.extrasAmt))]);
  }
  function row(label, val, bold, color){
    return '<tr style="border-bottom:1px solid #e8dcc8"><td style="padding:8px 12px;color:'+(color||'#4a3728')+';font-size:13px;'+(bold?'font-weight:700':'')+'">'+label+'</td><td style="padding:8px 12px;text-align:right;color:'+(color||'#4a3728')+';font-size:13px;font-weight:700">'+val+'</td></tr>';
  }

function csvcell(v){var s=String(v==null?'':v);s=s.split('"').join('""');if(s.indexOf(',')>=0||s.indexOf('\n')>=0)s='"'+s+'"';return s;}
function mkcsv(rows,cols){var L=[cols.map(csvcell).join(',')];rows.forEach(function(r){L.push(cols.map(function(c){return csvcell(r[c]);}).join(','));});return L.join('\n');}
function dlcsv(csv,name){try{var b=new Blob([csv],{type:'text/csv;charset=utf-8;'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u);},100);}catch(e){alert('Export failed. Try Chrome desktop.');}}

var NOTIFS=[],UNREAD=0;
function pushNotif(toUser,msg,type){
  if(!DB)return;
  DB.ref('notifs/'+toUser).push({msg:msg,type:type||'info',time:new Date().toISOString(),read:false});
}
function loadNotifs(){
  if(!DB||!AUTH)return;
  DB.ref('notifs/'+AUTH.key).limitToLast(15).on('value',function(snap){
    NOTIFS=[];UNREAD=0;
    if(snap.val()){Object.keys(snap.val()).forEach(function(k){var n=Object.assign({},snap.val()[k],{id:k});NOTIFS.unshift(n);if(!n.read)UNREAD++;});}
    var b=document.getElementById('nb');
    if(b){b.textContent=UNREAD||'';b.style.display=UNREAD>0?'block':'none';}
  });
}
function markRead(){
  if(!DB||!AUTH)return;
  NOTIFS.forEach(function(n){if(!n.read)DB.ref('notifs/'+AUTH.key+'/'+n.id+'/read').set(true);});
  UNREAD=0;
}
function renderNotifs(){
  var h='<div class="ovhdr"><h2>&#128276; Notifications</h2><button class="ovcl" data-action="close-ov">&#215;</button></div>';
  if(!NOTIFS.length)return h+'<div style="text-align:center;padding:30px;color:var(--mu)">No notifications</div>';
  NOTIFS.forEach(function(n){
    h+='<div style="padding:11px 12px;border-bottom:1px solid var(--b2);background:'+(n.read?'transparent':'rgba(200,146,42,.06)')+'">';
    h+='<div style="font-size:13px;font-weight:'+(n.read?400:700)+';color:'+(n.type==='payment'?'var(--gr)':n.type==='approval'?'var(--or)':'var(--bl)')+'">'+n.msg+'</div>';
    h+='<div style="color:var(--mu);font-size:10px;margin-top:2px">'+new Date(n.time).toLocaleString('en-IN')+'</div></div>';
  });
  return h;
}
